name: Opengrep Security Scan

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  opengrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - name: Install Opengrep
        run: curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
        
      - name: Run Opengrep Scan
        # continue-on-error ensures the upload step still fires if bugs are found
        continue-on-error: true
        run: |
          $HOME/.opengrep/cli/latest/opengrep scan --config auto --sarif --output=opengrep_results.sarif
        
      - name: Upload to DefectDojo
        if: always() 
        run: |
          curl -X POST "${{ secrets.DEFECT_DOJO_URL }}/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECT_DOJO_API_KEY }}" \
          -H "Content-Type: multipart/form-data" \
          -F "active=true" \
          -F "verified=true" \
          -F "scan_type=SARIF" \
          -F "engagement=1" \
          -F "file=@opengrep_results.sarif" \
          -F "close_old_findings=true" \
          -F "push_to_jira=false"
