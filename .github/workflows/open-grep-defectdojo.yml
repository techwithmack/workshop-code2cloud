name: Opengrep Security Scan

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  opengrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Use v4 (latest stable)

      - name: Install Opengrep
        run: curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
        
      - name: Run Opengrep Scan
        # We add '--json' to generate a file format DefectDojo understands
        # We use 'continue-on-error' so the upload happens even if vulnerabilities are found
        continue-on-error: true
        run: |
          $HOME/.opengrep/cli/latest/opengrep scan --config auto --json > opengrep_results.json
        
      - name: Upload to DefectDojo
        if: always() # Ensure this runs even if the scan found issues
        run: |
          curl -X POST "${{ secrets.DEFECT_DOJO_URL }}/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECT_DOJO_API_KEY }}" \
          -F "active=true" \
          -F "verified=true" \
          -H "Content-Type: multipart/form-data" \
          -F "scan_type=Semgrep JSON Report" \
          -F "engagement=${{ secrets.DEFECT_DOJO_ENGAGEMENT_ID }}" \
          -F "file=@opengrep_results.json" \
          -F "close_old_findings=true" \
          -F "push_to_jira=false"
