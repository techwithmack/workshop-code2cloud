name: ZAP Dynamic Security Scan

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the web application
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4 pinned

      - name: Start your application
        # Replace this with whatever command starts your app
        run: |
          npm install
          npm start & 
          npx wait-on http://localhost:3000 --timeout 60000

      - name: ZAP Baseline Scan
        # Pinned SHA for zaproxy/action-baseline@v0.12.0
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # The local URL we just spun up
          target: 'http://localhost:3000'
          # This will create a GitHub Issue if vulnerabilities are found
          allow_issue_writing: true
