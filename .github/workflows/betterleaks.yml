name: Betterleaks Secret Scan

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  betterleaks-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Still important: Fetch history so 'git mode' works
          fetch-depth: 0

      - name: Run Betterleaks
        uses: dortort/betterleaks-action@v0.1.0
        with:
          # Required for the action to pull the binary and run
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Shows exactly what it found in the logs
          verbose: 'true'
          # Hides the actual secrets in the logs so you don't leak them again
          redact: 'true'
