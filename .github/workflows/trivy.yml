name: Trivy Dependency & IaC Scan

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  trivy-scan:
    name: Scan Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        # We use 'continue-on-error' so the workflow doesn't stop if vulnerabilities are found
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy_results.json'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Upload to DefectDojo
        if: always() # Ensure this runs even if Trivy finds vulnerabilities
        run: |
          curl -X POST "${{ secrets.DEFECT_DOJO_URL }}/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECT_DOJO_API_KEY }}" \
          -H "Content-Type: multipart/form-data" \
          -F "active=true" \
          -F "verified=true" \
          -F "scan_type=Trivy Scan" \
          -F "engagement=2" \
          -F "file=@trivy_results.json" \
          -F "close_old_findings=true" \
          -F "push_to_jira=false"
