name: Trivy Dependency & IaC Scan

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  trivy-scan:
    name: Scan Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        # Use v0.36.0 or higher (with the 'v' prefix) for safety
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # 'fs' scans the filesystem for package.json, go.mod, Dockerfiles, etc.
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          # Only show things that actually have a fix available to reduce noise
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
