name: Opengrep

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  opengrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Opengrep
        run: curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
      - name: Run Opengrep
        run: $HOME/.local/bin/opengrep scan --config auto
