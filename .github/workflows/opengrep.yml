name: OpenGrep Local Rules Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  opengrep-scan:
    name: Run OpenGrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenGrep
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash

      - name: Run OpenGrep Scan
        # Scans the repo using local rules and prints findings directly to the GitHub Action log
        run: |
          opengrep scan --config .opengrep-rules/
